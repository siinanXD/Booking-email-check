version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Major bumps of the LLM/observability stack are deliberately deferred:
    # langchain-openai>=1 forces openai>=2 + langchain-core>=1 + langgraph>=1
    # (a coordinated langchain-1.0 migration on the critical LLM path), and
    # langfuse>=3 is an OpenTelemetry rewrite (~13 files). Do these as dedicated,
    # fully-tested migrations when there is a real driver — not as auto-bumps.
    # Minor/patch updates still flow through.
    ignore:
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langchain"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langchain-openai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langchain-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langgraph"
        update-types: ["version-update:semver-major"]
      # 0.x package: 0.2 -> 0.4 counts as semver-minor, so the major rule
      # never fires. 0.4 requires langgraph>=1 (ResolutionImpossible, PR #141)
      # — block minors too until the coordinated langchain-1.0 migration.
      - dependency-name: "langgraph-checkpoint-mongodb"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "langfuse"
        update-types: ["version-update:semver-major"]
      # Newer mypy minors already enforce stricter rules (1.20 flags every
      # langfuse @observe / locust @task as untyped-decorator plus stale
      # type: ignore comments, PR #142) — adopt via a dedicated cleanup pass,
      # not a weekly auto-bump.
      - dependency-name: "mypy"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # react and react-dom must stay on the exact same version — a solo bump
    # fails the test suite ("Incompatible React versions", PR #151).
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
